<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="glow-burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#A855F7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF4D6D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-ignite" cx="50%" cy="52%" r="48%">
      <stop offset="0%" stop-color="#FF4D6D" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#FF7A00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF7A00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="28%" y1="18%" x2="78%" y2="88%">
      <stop offset="0%" stop-color="#6a6a72"/>
      <stop offset="35%" stop-color="#2a2a30"/>
      <stop offset="70%" stop-color="#141418"/>
      <stop offset="100%" stop-color="#08080a"/>
    </linearGradient>
    <linearGradient id="ring-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099FF"/>
      <stop offset="32%" stop-color="#00D4FF"/>
      <stop offset="55%" stop-color="#A855F7"/>
      <stop offset="78%" stop-color="#FF4D6D"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </linearGradient>
    <radialGradient id="glass" cx="34%" cy="30%" r="68%">
      <stop offset="0%" stop-color="rgba(0,212,255,0.45)"/>
      <stop offset="38%" stop-color="rgba(20,18,48,0.96)"/>
      <stop offset="100%" stop-color="#06060c"/>
    </radialGradient>
    <filter id="premium-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Premium glow (works on light + dark wallpapers) -->
  <circle cx="256" cy="256" r="210" fill="url(#glow-burst)"/>
  <circle cx="256" cy="256" r="188" fill="url(#glow-ignite)"/>

  <!-- Lens assembly -->
  <g filter="url(#premium-glow)">
    <circle cx="256" cy="256" r="168" fill="url(#metal)"/>
    <circle cx="256" cy="256" r="168" fill="none" stroke="url(#ring-accent)" stroke-width="5" stroke-opacity="0.85"/>
    <circle cx="256" cy="256" r="152" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <circle cx="256" cy="256" r="128" fill="url(#glass)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

    <!-- Aperture blades -->
    <g transform="translate(256 256)">
      <g transform="rotate(0)"><polygon points="-26,0 26,0 0,-78" fill="rgba(4,4,8,0.94)"/></g>
      <g transform="rotate(60)"><polygon points="-26,0 26,0 0,-78" fill="rgba(4,4,8,0.94)"/></g>
      <g transform="rotate(120)"><polygon points="-26,0 26,0 0,-78" fill="rgba(4,4,8,0.94)"/></g>
      <g transform="rotate(180)"><polygon points="-26,0 26,0 0,-78" fill="rgba(4,4,8,0.94)"/></g>
      <g transform="rotate(240)"><polygon points="-26,0 26,0 0,-78" fill="rgba(4,4,8,0.94)"/></g>
      <g transform="rotate(300)"><polygon points="-26,0 26,0 0,-78" fill="rgba(4,4,8,0.94)"/></g>
    </g>

    <!-- Glass reflection -->
    <ellipse cx="214" cy="196" rx="54" ry="20" fill="rgba(255,255,255,0.26)" transform="rotate(-26 214 196)"/>
    <ellipse cx="228" cy="188" rx="18" ry="8" fill="rgba(0,212,255,0.18)" transform="rotate(-26 228 188)"/>

    <!-- Center pupil -->
    <circle cx="256" cy="256" r="24" fill="#030308"/>
    <circle cx="256" cy="256" r="24" fill="none" stroke="rgba(168,85,247,0.35)" stroke-width="1.5"/>

    <!-- Lens flare -->
    <ellipse cx="312" cy="172" rx="16" ry="6" fill="rgba(255,255,255,0.16)" transform="rotate(32 312 172)"/>
  </g>
</svg>
